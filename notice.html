<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notice Board</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="notice">
    <header id="site-header"></header>

    <main class="page-shell">
      <section class="section reveal">
        <div class="section-heading">
          <p class="eyebrow">Announcements</p>
          <h1>Notice Board</h1>
          <p>Stay informed with recent updates from departments, administration, and student affairs.</p>
        </div>

        <div class="notice-board-shell">
          <div class="notice-board-intro">
            <div>
              <span class="notice-kicker">Public notice stream</span>
              <h3>Department circulars, reminders, and academic announcements</h3>
            </div>
          </div>
          <div class="notice-list" id="publicNoticeList" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>
    <script src="js/script.js"></script>
  </body>
</html>
