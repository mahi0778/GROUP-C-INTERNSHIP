<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Student Attendance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-panel">
        <div class="login-card fade-in delay-1">
          <div class="brand-block">
            <p class="eyebrow">Welcome Back</p>
            <h1>Login to continue</h1>
            <p>Select your academic role and sign in to access your portal dashboard.</p>
          </div>

          <!-- Alert Container for Feedback -->
          <div class="alert-box" id="loginAlert" style="display: none;"></div>

          <form class="login-form fade-in delay-4" id="loginForm" novalidate>
            <div class="role-switcher">
              <label>
                <input type="radio" name="role" value="student" checked />
                <span>Student</span>
              </label>
              <label>
                <input type="radio" name="role" value="gfm" />
                <span>GFM</span>
              </label>
              <label>
                <input type="radio" name="role" value="hod" />
                <span>HOD</span>
              </label>
            </div>

            <label>
              Email Address
              <input type="email" id="email" placeholder="name@college.edu" required />
            </label>

            <label>
              Password
              <div class="password-input-wrapper">
                <input type="password" id="password" placeholder="Enter password" required />
                <button type="button" class="toggle-password-btn" id="togglePassword" aria-label="Toggle Password Visibility">
                  <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </button>
              </div>
            </label>

            <div class="form-row">
              <label class="checkbox-row">
                <input type="checkbox" id="rememberMe" />
                <span>Remember Me</span>
              </label>
              <a href="#" onclick="alert('Forgot password? Please contact your Administrator or HOD.'); return false;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span>Login to Portal</span>
              <i class="fa-solid fa-arrow-right"></i>
            </button>

            <a class="back-link" href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
          </form>
        </div>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
