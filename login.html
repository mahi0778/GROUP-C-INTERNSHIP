<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Attendance Portal</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="brand-block">
          <p class="eyebrow">GFM Attendance Portal</p>
          <h1>Welcome Back</h1>
          <p>Access your role-based attendance dashboard with a secure and polished experience.</p>
        </div>

        <form class="login-form" id="loginForm">
          <div class="role-switcher">
            <label>
              <input type="radio" name="role" value="student" checked />
              <span>Student</span>
            </label>
            <label>
              <input type="radio" name="role" value="gfm" />
              <span>Guardian Faculty Member</span>
            </label>
            <label>
              <input type="radio" name="role" value="hod" />
              <span>Head of Department</span>
            </label>
          </div>

          <label>
            Email
            <input type="email" id="email" placeholder="name@college.edu" required />
          </label>
          <label>
            Password
            <input type="password" id="password" placeholder="Enter password" required />
          </label>

          <div class="form-row">
            <label class="checkbox-row">
              <input type="checkbox" />
              <span>Remember Me</span>
            </label>
            <a href="#">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary">Login</button>
          <a class="back-link" href="index.html">Back to Home</a>
        </form>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
